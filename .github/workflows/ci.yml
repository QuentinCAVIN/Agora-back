name: Back CI — AGORA

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────
  # 🏗️ BUILD
  # ─────────────────────────────
  build:
    name: Build (compile)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile project
        run: ./mvnw clean package -DskipTests -q

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: target/


  # ─────────────────────────────
  # 🧪 TEST
  # ─────────────────────────────
  test:
    name: Tests (Spring Boot + PostgreSQL)
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: agora_dev
          POSTGRES_USER: agora
          POSTGRES_PASSWORD: agora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agora"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: target/

      - name: Run tests
        run: ./mvnw test -q
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/agora_dev
          SPRING_DATASOURCE_USERNAME: agora
          SPRING_DATASOURCE_PASSWORD: agora

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/


  # ─────────────────────────────
  # 🚀 RELEASE (main uniquement)
  # ─────────────────────────────
  release:
    name: Release Artifact
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: target/

      - name: Prepare release
        run: |
          mkdir release
          cp target/*.jar release/agora-back-${{ github.sha }}.jar

      - uses: actions/upload-artifact@v4
        with:
          name: release-agora-${{ github.sha }}
          path: release/