spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agora}
    username: ${SPRING_DATASOURCE_USERNAME:agora}
    password: ${SPRING_DATASOURCE_PASSWORD:agora}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

  flyway:
    enabled: true
    out-of-order: true