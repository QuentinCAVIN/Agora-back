# CORS : en profil dev, tout reste permis par défaut (voir CorsConfig). Pas de liste stricte ici.
# Production : restreindre via agora.cors.allowed-origin-patterns dans la config déployée.

spring:
  datasource:
    # Permet de fonctionner en dev :
    # - via Docker (SPRING_DATASOURCE_* injectés par compose)
    # - ou via spring-boot:run en local (DB_* depuis .env si exportées)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agora}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:agora}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASS:agora}}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false

  flyway:
    enabled: true
    out-of-order: true