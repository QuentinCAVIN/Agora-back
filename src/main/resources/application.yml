server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 12MB
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  profiles:
    default: dev
  flyway:
    enabled: true
    locations: classpath:db/migration

agora:
  jwt:
    secret: ${AGORA_JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS}
    expires-in-seconds: ${AGORA_JWT_EXPIRES_IN_SECONDS:3600}
    refresh-expires-in-seconds: ${AGORA_JWT_REFRESH_EXPIRES_IN_SECONDS:1209600} # 14 jours
    impersonation-expires-in-seconds: ${AGORA_JWT_IMPERSONATION_EXPIRES_IN_SECONDS:1800}
  # CORS : si allowed-origin-patterns est vide/absent, défauts dev (localhost, .local, RFC1918) — voir CorsConfig.
  # Production : lister uniquement les origines réelles, ex. [ "https://app.ville.fr" ]
  cors:
    allow-credentials: true
    max-age-seconds: 3600
  auth:
    admin-email: ${AGORA_AUTH_ADMIN_EMAIL:admin@agora.local}
    refresh-cookie:
      name: ${AGORA_AUTH_REFRESH_COOKIE_NAME:refreshToken}
      path: ${AGORA_AUTH_REFRESH_COOKIE_PATH:/api/auth}
      same-site: ${AGORA_AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
      secure: ${AGORA_AUTH_REFRESH_COOKIE_SECURE:false}
      domain: ${AGORA_AUTH_REFRESH_COOKIE_DOMAIN:}

springdoc:
  api-docs:
    path: /v3/api-docs
  # Explicit pour éviter tout sous-ensemble d’endpoints si une config locale restreint le scan.
  packages-to-scan: com.agora.controller
  paths-to-match: /api/**
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    level: "%5p [traceId=%X{traceId}] [corrId=%X{correlationId}]"
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN