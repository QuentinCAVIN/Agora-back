server:
  port: 8080

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  profiles:
    default: dev
  flyway:
    enabled: true
    locations: classpath:db/migration

agora:
  jwt:
    secret: ${AGORA_JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS}
    expires-in-seconds: ${AGORA_JWT_EXPIRES_IN_SECONDS:3600}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    level: "%5p [traceId=%X{traceId}] [corrId=%X{correlationId}]"