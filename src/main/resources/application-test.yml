spring:
  datasource:
    url: jdbc:h2:mem:agora-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  h2:
    console:
      enabled: true

agora:
  jwt:
    secret: "AGORA_TEST_JWT_SECRET_32_CHARS_MINIMUM_1234567890"
    expires-in-seconds: 3600